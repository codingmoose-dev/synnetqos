# Local path configuration for SynNetQoS.

synthetic_dataset: "data/synthetic/synnetqos-dataset.csv"

data:
  synthetic_dir: "data/synthetic"
  external_dir: "data/external"

external_sources:
  campus_qos:
    ntnu_throughput: "data/external/campus_qos/ntnu_tput_all_Throughput.csv"
    wue_throughput: "data/external/campus_qos/wue_tput_all_Throughput.csv"
  vienna:
    phone_lte: "data/external/vienna/phone/phone_data_lte.parquet"
    phone_5g: "data/external/vienna/phone/phone_data_5g.parquet"
    scanner_lte: "data/external/vienna/scanner/scanner_data_lte.parquet"
    scanner_5g: "data/external/vienna/scanner/scanner_data_5g.parquet"
  ns3_lena:
    raw_dir: "data/external/ns3_lena/raw"
    processed_dir: "data/external/ns3_lena/processed"
    run_manifest: "data/external/ns3_lena/raw/ns3_lena_run_manifest.csv"

results:
  generator: "results/generator"
  external_alignment: "results/external_alignment"
  ml_benchmark: "results/ml_benchmark"
  simulator_comparison: "results/simulator_comparison"

figures:
  external_alignment: "figures/external_alignment"
  ml_benchmark: "figures/ml_benchmark"
  supplementary: "figures/supplementary"
  simulator_comparison: "figures/simulator_comparison"