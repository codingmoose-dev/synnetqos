# Reference generator configuration for SynNetQoS.
# This file documents the fixed public generator settings.
# Runtime values are currently defined in src/synnetqos/config.py and src/synnetqos/profiles.py.

generator:
  seed: 42
  num_sessions: 5000
  session_length: 10
  start_date: "2025-07-26"

activity:
  activity_factor: 0.10
  activity_factor_std: 0.025

path_loss:
  propagation_model: "tr38901_umi_street_canyon"

  tr38901_umi_street_canyon:
    effective_tx_power_dbm: 44.0
    base_station_height_m: 10.0
    ue_height_m: 1.5
    light_speed_m_per_s: 3.0e8
    default_carrier_frequency_ghz: 3.5
    los_shadow_fading_std_db: 4.0
    nlos_shadow_fading_std_db: 7.82
    fast_fading_std_db: 2.0
    min_2d_distance_m: 10.0
    max_2d_distance_m: 5000.0

  legacy_log_distance:
    pl0_db: 61.4
    d0_km: 0.01
    path_loss_exponent: 3.3

  rsrp_min_dbm: -135.0
  rsrp_max_dbm: -50.0

environment:
  indoor_probability: 0.35
  indoor_penalty_db: 10.0
  indoor_high_obstruction_probability: 0.45
  tower_distance_gamma_shape: 2.0
  tower_distance_gamma_scale: 0.35
  tower_distance_max_km: 2.0

traffic:
  jitter_latency_divisor: 650.0
  demand_sigma: 0.9
  uplink_capacity_ratio:
    "4G": 0.15
    "5G NSA": 0.25
    "5G SA": 0.35

scenario_levels:
  network_types:
    - "4G"
    - "5G NSA"
    - "5G SA"
  weather_types:
    - "Clear"
    - "Rainy"
    - "Foggy"
  obstruction_levels:
    - "Low"
    - "Medium"
    - "High"
  movement_speeds:
    - "Static"
    - "Walking"
    - "Driving"
  app_types:
    - "Streaming"
    - "Browse"
    - "Gaming"
    - "Call"
  tower_load_levels:
    - "Light"
    - "Moderate"
    - "Heavy"

